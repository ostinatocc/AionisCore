name: Lite Beta Feedback
description: Report Lite runtime issues, operator friction, or local automation kernel regressions.
title: "[lite] "
labels:
  - lite
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this form for Lite runtime regressions, local setup failures, and operator feedback.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One clear sentence describing the problem.
      placeholder: Lite automation run paused unexpectedly after resume.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, and relevant env overrides.
      placeholder: macOS 15, Node 22.13.1, LITE_LOCAL_ACTOR_ID=lucio
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the exact commands or API calls used.
      placeholder: |
        1. npm install
        2. npm run start:lite
        3. npm run smoke:lite
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or Health Output
      description: Paste the relevant `/health`, error envelope, or smoke output.
    validations:
      required: false
