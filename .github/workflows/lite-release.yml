name: Aionis Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  lite-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Package release checks
        run: npm run -s packages:release:check

      - name: Resolve version
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -p 'require("./package.json").version')"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack source
        run: tar --exclude-vcs --exclude='./node_modules' --exclude='./.aionisgo' --exclude='./.tmp' --exclude='./artifacts' -czf "aionis-${{ steps.version.outputs.version }}-source.tgz" .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: aionis-source
          path: aionis-${{ steps.version.outputs.version }}-source.tgz
