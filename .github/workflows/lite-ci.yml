name: Lite CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lite-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Docs check
        run: npm run -s docs:check

      - name: Build
        run: npm run -s build

      - name: Contract tests
        run: npm run -s test:lite

      - name: Lite smoke
        run: npm run -s smoke:lite
