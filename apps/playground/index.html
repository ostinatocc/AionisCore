    <title>Aionis Playground</title>
    <!--
      No third-party font CDN: Playground is accessed from regions where
      fonts.googleapis.com is slow or blocked (notably mainland China), and a
      blocking stylesheet from a public CDN hurts first-paint everywhere
      else. We rely on the VI fallback chain declared in
      `@aionis/ui-kit/theme/fonts`. To upgrade brand fidelity for the hosted
      build, self-host Newsreader and JetBrains Mono woff2 files under
      `apps/playground/public/fonts/` and declare `@font-face` rules in a
      separate, bundled stylesheet.
    -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Crect width='80' height='80' rx='18' fill='%23352e4d'/%3E%3Cpath d='M22 58L40 20L58 58' stroke='%23ede8db' stroke-width='6.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M31 42H49' stroke='%23aba2c8' stroke-width='6.5' stroke-linecap='round'/%3E%3Ccircle cx='40' cy='20' r='2.4' fill='%23ede8db'/%3E%3C/svg%3E"
    />
