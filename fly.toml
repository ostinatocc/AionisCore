# Fly.io configuration for the Aionis Playground backend.
#
# Single VM that runs two processes via scripts/playground-container-entrypoint.sh:
#   - Aionis Lite           (internal, 127.0.0.1:3001)
#   - Playground adapter    (public, 0.0.0.0:8080)
#
# The persistent volume `aionis_playground_data` is mounted at /data and
# holds the two SQLite files plus the `.seeded` marker, so restarts keep
# the demo scope populated.

app = "aionis-playground-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.playground"

[env]
  PORT = "3001"
  ADAPTER_PORT = "8080"
  ADAPTER_HOST = "0.0.0.0"
  LITE_UPSTREAM = "http://127.0.0.1:3001"
  LITE_INSPECTOR_ENABLED = "false"
  LITE_LOCAL_ACTOR_ID = "playground-public"
  AIONIS_EDITION = "lite"
  AIONIS_MODE = "local"
  MEMORY_AUTH_MODE = "off"
  TENANT_QUOTA_ENABLED = "false"
  SANDBOX_ENABLED = "false"
  SANDBOX_ADMIN_ONLY = "true"
  DATA_DIR = "/data"
  LITE_REPLAY_SQLITE_PATH = "/data/aionis-lite-replay.sqlite"
  LITE_WRITE_SQLITE_PATH = "/data/aionis-lite-write.sqlite"
  SEED_PACK_PATH = "/app/apps/playground/public/seed-pack.json"
  DEMO_TENANT_ID = "default"
  DEMO_SCOPE = "playground:demo"
  # Kept conservative; the adapter also rate-limits per IP in-process.
  ADAPTER_RATE_LIMIT_MAX = "10"
  ADAPTER_RATE_LIMIT_WINDOW_MS = "60000"
  ADAPTER_ALLOWED_ORIGINS = "https://playground.aionis.dev,http://localhost:5173,http://127.0.0.1:5173"

[[mounts]]
  source = "aionis_playground_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
